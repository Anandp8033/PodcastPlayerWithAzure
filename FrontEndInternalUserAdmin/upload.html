<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="icon" href="https://www.oceaneering.com/wp-content/uploads/2023/08/cropped-favicon-2-32x32.png" sizes="32x32">
    <title>Upload Podcast | Leaders Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.plyr.io/3.7.8/plyr.css" rel="stylesheet" />
    <link href="/css/style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <script>
        const token = localStorage.getItem('adminToken') || sessionStorage.getItem('adminToken');
        const ssoToken = sessionStorage.getItem('ssoToken');
        if (!token && !ssoToken) {
            window.location.replace('./index.html');
        }
</script>
</head>
<body style="display:none;">
    <header class="sticky-top px-4 py-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3" >
                <a href="#" class="d-flex align-items-center gap-2 text-decoration-none">
                    <img src="https://oceaneering.com/wp-content/uploads/2023/08/header-logo.png" alt="Podcast Logo" style="width: 130px; height: 40px;" />
                   </a>
            </div>
        </div>
    </header>

    <main class="upload-main px-4 py-5">
        <div class="container-fluid max-width-1200">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h1 class="text-white fw-bold mb-2">Upload Podcast</h1>
                    <p class="text-silver opacity-60 mb-0">Add new episodes to your podcast library</p>
                </div>
                <div class="d-flex align-items-center gap-2">                    
                    <button type="button" onclick="logout()" class="btn-teal" style="white-space: nowrap;">
                        <span class="material-symbols-outlined me-2">logout</span>
                        Sign Out
                    </button>
                </div>
            </div>

            <form id="upload-form">
                <div class="row g-4">
                    <!-- Left Column - File Upload -->
                    <div class="col-lg-6">
                        <div class="upload-card">
                            <h3 class="text-teal fw-bold mb-4">
                                <span class="material-symbols-outlined me-2">cloud_upload</span>
                                Audio File
                            </h3>
                            
                            <div class="file-drop-zone" id="drop-zone">
                                <input type="file" id="audio-file" accept="audio/*" hidden />
                                <div class="text-center">
                                    <span class="material-symbols-outlined text-teal" style="font-size: 48px">audio_file</span>
                                    <p class="text-white mt-3 mb-1">Drag & drop audio file here</p>
                                    <p class="text-silver opacity-60 small">or <span class="text-teal" onclick="document.getElementById('audio-file')">browse</span> to choose</p>
                                </div>
                            </div>

                            <div id="audio-preview" class="audio-info mt-3 d-none">
                                <div class="d-flex align-items-center gap-3 p-3 rounded-3" style="background: rgba(0,255,208,0.1); border: 1px solid rgba(0,255,208,0.3);">
                                    <span class="material-symbols-outlined text-teal">music_note</span>
                                    <div class="flex-grow-1">
                                        <p class="text-white mb-0 fw-medium" id="file-name">filename.mp3</p>
                                        <p class="text-silver mb-0 small" id="file-size">0 MB</p>
                                    </div>
                                    <span class="badge bg-teal text-navy" id="audio-duration">Calculating...</span>
                                </div>
                            </div>

                            <!-- Subtitle Files -->
                            <h4 class="text-teal fw-bold mt-4 mb-3">Subtitle Files (VTT)</h4>
                            <div class="row g-3">
                                <div class="col-6">
                                    <label class="text-silver small">English</label>
                                    <input type="file" class="form-control custom-input" accept=".vtt" data-lang="en" />
                                </div>
                                <div class="col-6">
                                    <label class="text-silver small">German</label>
                                    <input type="file" class="form-control custom-input" accept=".vtt" data-lang="de" />
                                </div>
                                <div class="col-6">
                                    <label class="text-silver small">Spanish</label>
                                    <input type="file" class="form-control custom-input " accept=".vtt" data-lang="es" />
                                </div>
                                <div class="col-6">
                                    <label class="text-silver small">French</label>
                                    <input type="file" class="form-control custom-input" accept=".vtt" data-lang="fr" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column - Episode Details -->
                    <div class="col-lg-6">
                        <div class="upload-card">
                            <h3 class="text-teal fw-bold mb-4">
                                <span class="material-symbols-outlined me-2">info</span>
                                Episode Details
                            </h3>

                            <div class="form-group mb-3">
                                <label class="text-teal fw-bold text-uppercase letter-spacing-widest small" style="font-size: 10px">Episode Title</label>
                                <input type="text" class="form-control custom-input" id="episode-title" placeholder="Enter episode title" required />
                            </div>

                            <div class="form-group mb-3">
                                <label class="text-teal fw-bold text-uppercase letter-spacing-widest small" style="font-size: 10px">Subtitle / Description</label>
                                <textarea class="form-control custom-input" id="episode-subtitle" rows="2" placeholder="Brief description"></textarea>
                            </div>

                            <div class="row g-3 mb-3">
                                <div class="col-6">
                                    <label class="text-teal fw-bold text-uppercase letter-spacing-widest small" style="font-size: 10px">Episode Number</label>
                                    <input type="number" class="form-control custom-input" id="episode-number" placeholder="1" min="1" required />
                                </div>
                                <div class="col-6">
                                    <label class="text-teal fw-bold text-uppercase letter-spacing-widest small" style="font-size: 10px">Publish Date</label>
                                    <input type="text" class="form-control custom-input" id="episode-date" placeholder="Q1, 2026" required />
                                </div>
                            </div>

                            <div class="form-group mb-4">
                                <label class="text-teal fw-bold text-uppercase letter-spacing-widest small" style="font-size: 10px">Cover Image</label>
                                <input type="file" class="form-control custom-input" id="episode-image" accept="image/*" />
                            </div>

                            <div class="d-flex gap-3">
                                <button type="submit" class="btn-teal flex-grow-1 py-3 fw-bold">
                                    <span class="material-symbols-outlined me-2">upload</span>
                                    Upload Episode
                                </button>
                                <button type="button" class="btn-outline-custom px-4 py-3" onclick="resetForm()">
                                    <span class="material-symbols-outlined">refresh</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

            <div id="upload-message" class="alert mt-4 d-none"></div>
        </div>
    </main>

    <script type="module" src="/src/upload.js"></script>
</body>
</html>
