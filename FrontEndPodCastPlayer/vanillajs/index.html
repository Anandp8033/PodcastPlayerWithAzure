<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link rel="icon" href="https://www.oceaneering.com/wp-content/uploads/2023/08/cropped-favicon-2-32x32.png"
        sizes="32x32">
    <title>Podcast Login | Leaders Podcast</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.plyr.io/3.7.8/plyr.css" rel="stylesheet" />
    <link href="./css/autthPage.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script>
        // Industry Standard: Redirect to dashboard if already logged in
        const token = localStorage.getItem('podcastToken') || sessionStorage.getItem('podcastToken');
        const ssoToken = sessionStorage.getItem('ssoToken');
        if (token || ssoToken) {
            window.location.replace('./podcast.html');
        }
    </script>
</head>

<body class="auth-page">
    <header class="sticky-top px-4 py-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <a href="#" class="d-flex align-items-center gap-2 text-decoration-none">
                <img src="https://oceaneering.com/wp-content/uploads/2023/08/header-logo.png" alt="Podcast Logo"
                    style="width: 130px; height: 40px;" />
            </a>
        </div>
        </div>
    </header>
    <main class="auth-main">
        <div class="auth-container">
            <!-- Toggle Buttons -->
            <div class="auth-toggle mb-4">
                <button class="btn-toggle active" data-tab="login">Sign In</button>
                <!-- <button class="btn-toggle" data-tab="register">register</button> -->

                <button class="btn-toggle" data-tab="sso">SSO Login</button>
            </div>

            <div id="auth-status" class="alert alert-info d-none mb-3"></div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active d-none">
                <h2 class="text-white fw-bold mb-2">Welcome Back</h2>
                <p class="text-silver opacity-60 mb-4">Sign in to manage your podcast content</p>

                <div class="form-group mb-3">
                    <label class="text-teal fw-bold text-uppercase letter-spacing-widest small"
                        style="font-size: 10px">Email</label>
                    <input type="email" class="form-control custom-input" id="login-email"
                        placeholder="admin@example.com" required />
                </div>

                <div class="form-group mb-3">
                    <label class="text-teal fw-bold text-uppercase letter-spacing-widest small"
                        style="font-size: 10px">Password</label>
                    <input type="password" class="form-control custom-input" id="login-password"
                        placeholder="Enter your password" autocomplete="current-password" required />
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember-me" />
                        <label class="form-check-label text-silver small" for="remember-me">Remember me</label>
                    </div>
                    <a href="#" class="text-teal small">Forgot password?</a>
                </div>

                <button type="submit" class="btn-teal w-100 py-3 fw-bold">
                    <span class="material-symbols-outlined me-2">login</span>
                    Sign In
                </button>
            </form>

            <!-- Register Form -->
            <!-- <form id="register-form" class="auth-form d-none">

            <!-- SSO Login Form -->
            <div id="sso-form" class="auth-form d-none">
                <h2 class="text-white fw-bold mb-2">Microsoft Entra ID Login</h2>
                <p class="text-silver opacity-60 mb-4">Sign in with your organizational account</p>

                <div id="sso-status" class="alert alert-info d-none mb-3"></div>

                <button type="button" id="sso-login-btn" class="btn-teal w-100 py-3 fw-bold">
                    <span class="material-symbols-outlined me-2">login</span>
                    Sign In with Microsoft
                </button>
            </div>

            <div id="auth-message" class="alert mt-3 d-none"></div>
        </div>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>
